name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format + Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caching to increase performance as dependency tree grows
      - uses: Swatinem/rust-cache@v2

      - name: Build Whamm Core Library
        run: |
          pushd whamm_core
          rustup target add wasm32-wasip1
          cargo build --release --target wasm32-wasip1
          popd

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          rustup target add wasm32-wasip1
          cargo clippy --all-features --all-targets -- -D warnings

  # Run CLI across OS targets
  build_and_test:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    # CI-only: trim debuginfo to speed codegen + linking of the test binaries.
    # line-tables-only keeps file:line in panic backtraces.
    env:
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
      CARGO_PROFILE_RELEASE_DEBUG: line-tables-only

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Caching per OS
      - uses: Swatinem/rust-cache@v2

      - uses: plinioh/setup-binary-action@v1.0.0
        with:
          binaryName: wasm2wat
          binaryUrl: https://github.com/WebAssembly/wabt/releases/download/1.0.34/wabt-1.0.34-ubuntu.tar.gz
          binaryPathInArchive: wabt-1.0.34/bin/wasm2wat

      - name: Setup `wasmtime`
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: "v43.0.1"

      - name: Check `wasmtime`
        run: "wasmtime --version"

      - name: Setup WASI P1 Target
        run: |
          echo "[INFO] Installing the 'wasm32-wasip1' compilation target..."
          rustup target add wasm32-wasip1

      - name: Setup wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: Check `wasm-tools`
        run: wasm-tools --version

      # Resolve upstream HEAD commits without cloning so the engine cache key
      # tracks "latest" but only invalidates when an upstream actually changes.
      - name: Resolve engine versions
        id: engine_versions
        run: |
          {
            echo "progress=$(git ls-remote https://github.com/titzer/progress.git HEAD | cut -f1)"
            echo "virgil=$(git ls-remote https://github.com/titzer/virgil.git HEAD | cut -f1)"
            echo "wizard=$(git ls-remote https://github.com/titzer/wizard-engine.git HEAD | cut -f1)"
            echo "refinterp=$(git ls-remote https://github.com/WebAssembly/multi-memory.git HEAD | cut -f1)"
          } >> "$GITHUB_OUTPUT"

      # Virgil and Wizard track active upstreams, so they get their own cache key
      # — kept separate from the wasm ref interpreter, which rarely changes and is
      # expensive to rebuild (OCaml). A commit to Virgil no longer forces an OCaml
      # rebuild, and vice versa.
      - name: Cache Virgil + Wizard toolchain
        id: tools_cache
        uses: actions/cache@v4
        with:
          path: |
            progress
            virgil
            wizard-engine
          key: vtools-${{ runner.os }}-p${{ steps.engine_versions.outputs.progress }}-v${{ steps.engine_versions.outputs.virgil }}-w${{ steps.engine_versions.outputs.wizard }}

      - name: Cache wasm reference interpreter
        id: ref_cache
        uses: actions/cache@v4
        with:
          path: multi-memory/interpreter/wasm
          key: refinterp-${{ runner.os }}-ocaml5-r${{ steps.engine_versions.outputs.refinterp }}

      - name: Setup OCaml
        if: steps.ref_cache.outputs.cache-hit != 'true'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Setup progress
        if: steps.tools_cache.outputs.cache-hit != 'true'
        run: |
          echo "[INFO] Installing 'progress'..."
          git clone https://github.com/titzer/progress.git
      - name: Setup Virgil
        if: steps.tools_cache.outputs.cache-hit != 'true'
        run: |
          # virgil/bin holds v3c-host, which the Makefile's utils targets invoke.
          export PATH="$GITHUB_WORKSPACE/progress/bin:$GITHUB_WORKSPACE/virgil/bin:$PATH"
          echo "[INFO] Testing 'progress' is on PATH..."
          which progress.x86-64-linux

          echo "[INFO] Building 'virgil'..."
          git clone https://github.com/titzer/virgil.git
          pushd virgil && make && popd
      - name: Setup Wizard-Engine
        if: steps.tools_cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$GITHUB_WORKSPACE/progress/bin:$GITHUB_WORKSPACE/virgil/bin:$PATH"
          echo "[INFO] Testing 'virgil' is on PATH..."
          which v3c

          echo "[INFO] Building 'wizeng'..."
          git clone https://github.com/titzer/wizard-engine.git
          pushd wizard-engine
          make -j
          popd
      - name: Setup Wasm Spec Reference Interpreter
        if: steps.ref_cache.outputs.cache-hit != 'true'
        run: |
          echo "[INFO] Configuring OCaml..."
          eval $(opam env)
          opam install -y dune menhir

          echo "[INFO] Building the wasm ref interpreter..."
          git clone https://github.com/WebAssembly/multi-memory.git
          make -C multi-memory/interpreter -j

      # Assemble the engines dir from the (possibly cached) build outputs every
      # run, and re-add engine bins to PATH (GITHUB_PATH does not persist).
      - name: Assemble engines
        run: |
          export PATH="$GITHUB_WORKSPACE/progress/bin:$GITHUB_WORKSPACE/virgil/bin:$PATH"
          mkdir -p output/tests/engines
          cp wizard-engine/bin/unittest.x86-linux output/tests/engines/wizard-spectest
          ln -sf "${PWD}/wizard-engine/scripts/wizeng" output/tests/engines/wizeng
          cp multi-memory/interpreter/wasm output/tests/engines/wasm

          echo "[INFO] Verifying engine configuration..."
          ls -al output/tests/engines
          ./output/tests/engines/wizard-spectest --help || [ $? == 1 ]
          ./output/tests/engines/wizeng --help
          ./output/tests/engines/wasm --help

          echo "$GITHUB_WORKSPACE/progress/bin" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/virgil/bin" >> "$GITHUB_PATH"

      - name: Check main crate compiles
        run: cargo check --locked --all-features --verbose

      - name: Run tests
        run: cargo test --locked --all-features --verbose

      # Release tests run only on master pushes; PRs run the debug suite above.
      - name: Run tests (release)
        if: github.event_name == 'push'
        run: cargo test --release --locked --all-features --verbose
